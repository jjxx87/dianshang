{% extends "base.html" %}

{% block content %}
<div class="container">
    <h2 class="mb-4">商户中心</h2>
    <div class="row">
        <div class="col-md-3">
            <div class="card mb-3">
                <div class="card-header">菜单</div>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item"><a href="{{ url_for('merchant.dashboard') }}">商品管理</a></li>
                    <li class="list-group-item"><a href="#">订单管理</a></li>
                </ul>
            </div>
            <a href="{{ url_for('merchant.new_product') }}" class="btn btn-success w-100">添加商品</a>
        </div>
        <div class="col-md-9">
            <h3>商品列表</h3>
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>名称</th>
                        <th>价格</th>
                        <th>库存</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    {% for product in products %}
                    <tr>
                        <td>{{ product.id }}</td>
                        <td>{{ product.name }}</td>
                        <td>¥{{ product.price }}</td>
                        <td>{{ product.stock }}</td>
                        <td>
                            <a href="{{ url_for('merchant.edit_product', id=product.id) }}" class="btn btn-sm btn-primary">编辑</a>
                            <form action="{{ url_for('merchant.delete_product', id=product.id) }}" method="POST" style="display:inline;">
                                <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('确定要删除吗？')">删除</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
